<!DOCTYPE html>
<html>
<head><title>Task Manager</title></head>
<body>
    <h1>Task Manager</h1>
    <form action="/add" method="post">
        <input type="text" name="title" placeholder="New task..." required>
        <button type="submit">Add</button>
    </form>
    <ul>
        {% for task in tasks %}
        <li>{{ task['title'] }} — <a href="/delete/{{ task['id'] }}">Delete</a></li>
        {% endfor %}
    </ul>
</body>
</html>
