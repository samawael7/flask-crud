<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #6c63ff, #48cfad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 32px;
        }

        .add-form {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .add-form input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #2a2a3d;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }

        .add-form input:focus {
            border-color: #6c63ff;
        }

        .add-form button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #6c63ff, #48cfad);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .add-form button:hover { opacity: 0.85; }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a2e;
            border: 1px solid #2a2a3d;
            border-radius: 10px;
            padding: 14px 18px;
            transition: border-color 0.2s;
        }

        .task-item:hover { border-color: #6c63ff44; }

        .task-title {
            font-size: 0.95rem;
            color: #d0d0e0;
        }

        .delete-btn {
            background: none;
            border: 1px solid #ff4d6d44;
            color: #ff4d6d;
            padding: 6px 12px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #ff4d6d22;
            border-color: #ff4d6d;
        }

        .empty {
            text-align: center;
            color: #444;
            font-size: 0.9rem;
            padding: 40px 0;
        }

        .count {
            text-align: right;
            font-size: 0.8rem;
            color: #555;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Task Manager</h1>
        <p class="subtitle">Built with Flask · Deployed via Jenkins CI/CD</p>

        <form class="add-form" action="/add" method="post">
            <input type="text" name="title" placeholder="Add a new task..." required>
            <button type="submit">+ Add</button>
        </form>

        <p class="count">{{ tasks|length }} task{{ 's' if tasks|length != 1 else '' }}</p>

        <div class="task-list">
            {% if tasks %}
                {% for task in tasks %}
                <div class="task-item">
                    <span class="task-title">{{ task['title'] }}</span>
                    <a href="/delete/{{ task['id'] }}">
                        <button class="delete-btn">✕ Delete</button>
                    </a>
                </div>
                {% endfor %}
            {% else %}
                <p class="empty">No tasks yet. Add one above ☝️</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
